<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>BongoWaifu Bridge</title>
<style>
  :root { --bg:#16161e; --panel:#1f1f2b; --line:#2e2e3e; --txt:#e6e6ef; --dim:#8a8a9e; --acc:#e879a8; --acc2:#7aa2f7; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--txt); font:14px/1.5 'Segoe UI', sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin-right:auto; }
  .dot { width:10px; height:10px; border-radius:50%; background:#666; }
  .dot.on { background:#4ade80; }
  button { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 14px; cursor:pointer; }
  button:hover { border-color:var(--acc); }
  button.primary { background:var(--acc); color:#fff; border:none; }
  .tabs { display:flex; gap:4px; padding:8px 14px 0; }
  .tabs button { border-radius:6px 6px 0 0; border-bottom:none; }
  .tabs button.active { background:var(--acc); color:#fff; }
  main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .page { flex:1; overflow-y:auto; padding:14px; display:none; }
  .page.active { display:flex; flex-direction:column; }

  /* 채팅 */
  #chatLog { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:10px; }
  .msg { max-width:70%; padding:8px 12px; border-radius:12px; white-space:pre-wrap; }
  .msg.user  { align-self:flex-end; background:var(--acc2); color:#fff; border-bottom-right-radius:3px; }
  .msg.waifu { align-self:flex-start; background:var(--panel); border-bottom-left-radius:3px; }
  .msg.sys   { align-self:center; color:var(--dim); font-size:12px; background:none; }
  .msg .tag  { font-size:11px; color:var(--dim); display:block; }
  #chatBar { display:flex; gap:6px; padding-top:8px; border-top:1px solid var(--line); }
  #chatInput { flex:1; background:var(--panel); border:1px solid var(--line); border-radius:6px; color:var(--txt); padding:8px 10px; }

  /* 설정 */
  fieldset { border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:14px; }
  legend { color:var(--acc); padding:0 6px; font-size:13px; }
  .row { display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap; }
  .row label { width:140px; color:var(--dim); font-size:13px; }
  .row input[type=text], .row input[type=number], .row textarea {
    flex:1; min-width:180px; background:var(--bg); border:1px solid var(--line); border-radius:5px; color:var(--txt); padding:6px 8px; }
  .row textarea { resize:vertical; min-height:50px; }
  .hint { color:var(--dim); font-size:12px; margin-top:2px; }
  #memSummaryView { background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:8px; font-size:12px; color:var(--dim); white-space:pre-wrap; }
</style>
</head>
<body>
<header>
  <h1>BongoWaifu Bridge</h1>
  <span class="dot" id="dot"></span><span id="statusTxt" style="color:var(--dim);font-size:12px">중지됨</span>
  <button id="btnToggle" class="primary">시작</button>
</header>

<div class="tabs">
  <button class="active" data-page="chat">채팅</button>
  <button data-page="settings">설정</button>
</div>

<main>
  <!-- 채팅 -->
  <div class="page active" id="page-chat">
    <div id="chatLog"></div>
    <div id="chatBar">
      <input id="chatInput" placeholder="메시지 입력... (Enter: 대화 / Ctrl+Enter: 그대로 말풍선)">
      <button id="btnSend" class="primary">대화</button>
      <button id="btnSay" title="입력한 텍스트를 그대로 말풍선으로">대사</button>
      <button id="btnAsk" title="캐릭터가 버튼 달린 질문을 던짐">질문시키기</button>
    </div>
  </div>

  <!-- 설정 -->
  <div class="page" id="page-settings">
    <fieldset><legend>페르소나</legend>
      <div class="row"><label>이름</label><input type="text" id="personaName"></div>
      <div class="row"><label>나이</label><input type="text" id="personaAge"></div>
      <div class="row"><label>사용자 호칭</label><input type="text" id="userCall"></div>
      <div class="row"><label>성격</label><textarea id="personality"></textarea></div>
      <div class="row"><label>말투</label><textarea id="speechStyle"></textarea></div>
    </fieldset>

    <fieldset><legend>연결</legend>
      <div class="row"><label>BongoWaifu 포트</label><input type="number" id="bongoPort" min="7337" max="7356"></div>
      <div class="hint">게임 설정 화면의 AI Connection에 표시된 포트 (7337~7356)</div>
      <div class="row"><label>llama-server URL</label><input type="text" id="llamaUrl"></div>
      <div class="row"><label>모델명</label><input type="text" id="llamaModel"></div>
      <div class="row"><label>temperature</label><input type="number" id="temperature" step="0.1" min="0" max="2"></div>
      <div class="row"><label>max tokens</label><input type="number" id="maxTokens" min="16" max="1024"></div>
    </fieldset>

    <fieldset><legend>발화 트리거</legend>
      <div class="row"><label>폴링 주기(초)</label><input type="number" id="pollSec" min="1" max="60"></div>
      <div class="row"><label>잡담 간격(초)</label><input type="number" id="idleSec" min="15" max="3600"></div>
      <div class="row"><label>질문 확률(0~1)</label><input type="number" id="askChance" step="0.05" min="0" max="1"></div>
      <div class="hint">잡담 타이밍에 일반 대사 대신 버튼 질문(ask_and_wait)이 나갈 확률</div>
      <div class="row">
        <label><input type="checkbox" id="trigGreet"> 시작 인사</label>
        <label><input type="checkbox" id="trigHot"> 게이지 반응</label>
        <label><input type="checkbox" id="trigAchv"> 업적 축하</label>
        <label><input type="checkbox" id="trigIdle"> 잡담</label>
        <label><input type="checkbox" id="trigAsk"> 질문 허용</label>
      </div>
    </fieldset>

    <fieldset><legend>메모리</legend>
      <div class="row"><label>최근 기억 수(줄)</label><input type="number" id="memRecent" min="10" max="200"></div>
      <div class="row"><label><input type="checkbox" id="memSummary"> 장기 요약 사용</label></div>
      <div class="hint">최근 기억이 1.5배를 넘으면 오래된 기록을 로컬 모델이 요약해 보관 (32k 컨텍스트 기준 100줄도 여유)</div>
      <div class="row"><label>현재 장기 기억</label></div>
      <div id="memSummaryView">(없음)</div>
      <div class="row" style="margin-top:8px">
        <button id="btnMemRefresh">기억 보기 새로고침</button>
        <button id="btnMemClear">기억 전체 삭제</button>
      </div>
    </fieldset>

    <button id="btnSave" class="primary" style="align-self:flex-start">저장 (실행 중이면 재시작)</button>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const FIELDS_TXT = ['personaName','personaAge','userCall','personality','speechStyle','llamaUrl','llamaModel'];
const FIELDS_NUM = ['bongoPort','temperature','maxTokens','pollSec','idleSec','askChance','memRecent'];
const FIELDS_CHK = ['trigGreet','trigHot','trigAchv','trigIdle','trigAsk','memSummary'];
let running = false;

// 탭
document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('page-' + b.dataset.page).classList.add('active');
});

// 채팅 출력
function addMsg(cls, text, tag) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (tag) { const s = document.createElement('span'); s.className = 'tag'; s.textContent = tag; d.appendChild(s); }
  d.appendChild(document.createTextNode(text));
  $('chatLog').appendChild(d);
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
}

// 메인 프로세스 로그 수신 (자동 발화 등)
window.api.onLog(({ type, text }) => {
  if (type === 'say')    addMsg('waifu', text.replace(/^\[\w+\]\s*/, ''), text.match(/^\[(\w+)\]/)?.[1]);
  else if (type === 'ask')    addMsg('waifu', text, '질문');
  else if (type === 'answer') addMsg('user', text, '버튼 답변');
  else if (type === 'error')  addMsg('sys', '⚠ ' + text);
  else addMsg('sys', text);
});

// 시작/중지
function setStatus(on) {
  running = on;
  $('dot').classList.toggle('on', on);
  $('statusTxt').textContent = on ? '실행 중' : '중지됨';
  $('btnToggle').textContent = on ? '중지' : '시작';
}
$('btnToggle').onclick = async () => {
  if (running) { await window.api.stop(); setStatus(false); return; }
  $('btnToggle').disabled = true;
  const r = await window.api.start();
  $('btnToggle').disabled = false;
  if (r.ok) setStatus(true);
  else addMsg('sys', '⚠ 연결 실패: ' + r.error);
};

// 채팅 전송
async function sendChat() {
  const t = $('chatInput').value.trim();
  if (!t) return;
  $('chatInput').value = '';
  addMsg('user', t);
  const r = await window.api.chat(t);
  if (r.ok) addMsg('waifu', r.reply);
  else addMsg('sys', '⚠ ' + r.error);
}
async function sendSay() {
  const t = $('chatInput').value.trim();
  if (!t) return;
  $('chatInput').value = '';
  const r = await window.api.sayManual(t);
  if (!r.ok) addMsg('sys', '⚠ ' + r.error);
}
$('btnSend').onclick = sendChat;
$('btnSay').onclick = sendSay;
$('chatInput').onkeydown = e => {
  if (e.key === 'Enter') (e.ctrlKey ? sendSay : sendChat)();
};
$('btnAsk').onclick = async () => {
  addMsg('sys', '질문 생성 중... (게임 화면에서 버튼으로 답해줘)');
  const r = await window.api.askNow();
  if (!r.ok) addMsg('sys', '⚠ ' + r.error);
};

// 설정 로드/저장
async function loadSettings() {
  const s = await window.api.getSettings();
  FIELDS_TXT.forEach(k => $(k).value = s[k]);
  FIELDS_NUM.forEach(k => $(k).value = s[k]);
  FIELDS_CHK.forEach(k => $(k).checked = !!s[k]);
}
$('btnSave').onclick = async () => {
  const s = {};
  FIELDS_TXT.forEach(k => s[k] = $(k).value);
  FIELDS_NUM.forEach(k => s[k] = +$(k).value);
  FIELDS_CHK.forEach(k => s[k] = $(k).checked);
  const r = await window.api.saveSettings(s);
  addMsg('sys', r.ok ? '설정 저장됨' : '⚠ ' + r.error);
};

// 메모리
$('btnMemRefresh').onclick = async () => {
  const m = await window.api.getMemory();
  $('memSummaryView').textContent =
    (m.summary || '(요약 없음)') + `\n— 최근 기억 ${m.recent.length}줄 보관 중`;
};
$('btnMemClear').onclick = async () => {
  await window.api.clearMemory();
  $('memSummaryView').textContent = '(삭제됨)';
  addMsg('sys', '기억 전체 삭제됨');
};

loadSettings();
window.api.status().then(s => setStatus(s.running));
</script>
</body>
</html>
