<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>BongoWaifu Bridge</title>
<style>
  :root { --bg:#16161e; --panel:#1f1f2b; --line:#2e2e3e; --txt:#e6e6ef; --dim:#8a8a9e; --acc:#e879a8; --acc2:#7aa2f7; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--txt); font:14px/1.5 'Segoe UI', sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin-right:auto; }
  .dot { width:10px; height:10px; border-radius:50%; background:#666; }
  .dot.on { background:#4ade80; }
  button { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 14px; cursor:pointer; }
  button:hover { border-color:var(--acc); }
  button.primary { background:var(--acc); color:#fff; border:none; }
  #btnToggle.running { background:#ef4444; }
  #btnToggle.connecting { background:#666; cursor:wait; opacity:.7; }
  #btnToggle:disabled { pointer-events:none; }
  select { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 8px; }
  .tabs { display:flex; gap:4px; padding:8px 14px 0; }
  .tabs button { border-radius:6px 6px 0 0; border-bottom:none; }
  .tabs button.active { background:var(--acc); color:#fff; }
  main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .page { flex:1; overflow-y:auto; padding:14px; display:none; }
  .page.active { display:flex; flex-direction:column; }

  /* 채팅 */
  #chatLog { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:10px; }
  .msg { max-width:70%; padding:8px 12px; border-radius:12px; white-space:pre-wrap; }
  .msg.user  { align-self:flex-end; background:var(--acc2); color:#fff; border-bottom-right-radius:3px; }
  .msg.waifu { align-self:flex-start; background:var(--panel); border-bottom-left-radius:3px; }
  .msg.sys   { align-self:center; color:var(--dim); font-size:12px; background:none; }
  .msg .tag  { font-size:11px; color:var(--dim); display:block; }
  .msg.typing { color:var(--dim); }
  .msg.typing::after { content:' …'; animation:blink 1s infinite; }
  @keyframes blink { 50% { opacity:.2; } }
  #chatBar { display:flex; gap:6px; padding-top:8px; border-top:1px solid var(--line); }
  #chatInput { flex:1; background:var(--panel); border:1px solid var(--line); border-radius:6px; color:var(--txt); padding:8px 10px; }

  /* 설정 */
  fieldset { border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:14px; }
  legend { color:var(--acc); padding:0 6px; font-size:13px; }
  .row { display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap; }
  .row label { width:160px; color:var(--dim); font-size:13px; }
  .row input[type=text], .row input[type=number], .row textarea {
    flex:1; min-width:180px; background:var(--bg); border:1px solid var(--line); border-radius:5px; color:var(--txt); padding:6px 8px; }
  .row textarea { resize:vertical; min-height:50px; }
  .hint { color:var(--dim); font-size:12px; margin-top:2px; }
  #memSummaryView { background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:8px; font-size:12px; color:var(--dim); white-space:pre-wrap; }
</style>
</head>
<body>
<header>
  <h1>BongoWaifu Bridge</h1>
  <select id="language" title="Language">
    <option value="ko">한국어</option>
    <option value="en">English</option>
  </select>
  <span class="dot" id="dot"></span><span id="statusTxt" style="color:var(--dim);font-size:12px"></span>
  <button id="btnToggle" class="primary"></button>
</header>

<div class="tabs">
  <button class="active" data-page="chat" data-i18n="tabChat"></button>
  <button data-page="settings" data-i18n="tabSettings"></button>
</div>

<main>
  <!-- 채팅 -->
  <div class="page active" id="page-chat">
    <div id="chatLog"></div>
    <div id="chatBar">
      <input id="chatInput">
      <button id="btnSend" class="primary" data-i18n="btnSend"></button>
      <button id="btnSay" data-i18n="btnSay"></button>
      <button id="btnAsk" data-i18n="btnAsk"></button>
    </div>
  </div>

  <!-- 설정 -->
  <div class="page" id="page-settings">
    <fieldset><legend data-i18n="legPersona"></legend>
      <div class="row"><label data-i18n="lblName"></label><input type="text" id="personaName"></div>
      <div class="row"><label data-i18n="lblAge"></label><input type="text" id="personaAge"></div>
      <div class="row"><label data-i18n="lblCall"></label><input type="text" id="userCall"></div>
      <div class="row"><label data-i18n="lblPersonality"></label><textarea id="personality"></textarea></div>
      <div class="row"><label data-i18n="lblStyle"></label><textarea id="speechStyle"></textarea></div>
    </fieldset>

    <fieldset><legend data-i18n="legConn"></legend>
      <div class="row"><label data-i18n="lblPort"></label><input type="number" id="bongoPort" min="7337" max="7356"></div>
      <div class="hint" data-i18n="hintPort"></div>
      <div class="row"><label>llama-server URL</label><input type="text" id="llamaUrl"></div>
      <div class="row"><label data-i18n="lblModel"></label><input type="text" id="llamaModel"></div>
      <div class="row"><label>temperature</label><input type="number" id="temperature" step="0.1" min="0" max="2"></div>
      <div class="row"><label>max tokens</label><input type="number" id="maxTokens" min="16" max="1024"></div>
    </fieldset>

    <fieldset><legend data-i18n="legTrig"></legend>
      <div class="row"><label data-i18n="lblPoll"></label><input type="number" id="pollSec" min="1" max="60"></div>
      <div class="row"><label data-i18n="lblIdle"></label><input type="number" id="idleSec" min="15" max="3600"></div>
      <div class="row"><label data-i18n="lblAskChance"></label><input type="number" id="askChance" step="0.05" min="0" max="1"></div>
      <div class="hint" data-i18n="hintAskChance"></div>
      <div class="row">
        <label><input type="checkbox" id="trigGreet"> <span data-i18n="chkGreet"></span></label>
        <label><input type="checkbox" id="trigHot"> <span data-i18n="chkHot"></span></label>
        <label><input type="checkbox" id="trigAchv"> <span data-i18n="chkAchv"></span></label>
        <label><input type="checkbox" id="trigIdle"> <span data-i18n="chkIdle"></span></label>
        <label><input type="checkbox" id="trigAsk"> <span data-i18n="chkAsk"></span></label>
      </div>
    </fieldset>

    <fieldset><legend data-i18n="legMem"></legend>
      <div class="row"><label data-i18n="lblMemRecent"></label><input type="number" id="memRecent" min="10" max="200"></div>
      <div class="row"><label><input type="checkbox" id="memSummary"> <span data-i18n="chkMemSummary"></span></label></div>
      <div class="hint" data-i18n="hintMem"></div>
      <div class="row"><label data-i18n="lblMemView"></label></div>
      <div id="memSummaryView">—</div>
      <div class="row" style="margin-top:8px">
        <button id="btnMemRefresh" data-i18n="btnMemRefresh"></button>
        <button id="btnMemClear" data-i18n="btnMemClear"></button>
      </div>
    </fieldset>

    <button id="btnSave" class="primary" style="align-self:flex-start" data-i18n="btnSave"></button>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const FIELDS_TXT = ['language','personaName','personaAge','userCall','personality','speechStyle','llamaUrl','llamaModel'];
const FIELDS_NUM = ['bongoPort','temperature','maxTokens','pollSec','idleSec','askChance','memRecent'];
const FIELDS_CHK = ['trigGreet','trigHot','trigAchv','trigIdle','trigAsk','memSummary'];
let running = false;

// ─────────── UI 다국어 ───────────
const I18N = {
  ko: {
    tabChat:'채팅', tabSettings:'설정',
    statusOn:'실행 중', statusOff:'중지됨', statusConnecting:'연결 중...', btnStart:'시작', btnStop:'중지', btnConnecting:'연결 중...',
    placeholder:'메시지 입력... (Enter: 대화 / Ctrl+Enter: 그대로 말풍선)',
    btnSend:'대화', btnSay:'대사', btnAsk:'질문시키기',
    legPersona:'페르소나', lblName:'이름', lblAge:'나이', lblCall:'사용자 호칭', lblPersonality:'성격', lblStyle:'말투',
    legConn:'연결', lblPort:'BongoWaifu 포트', lblModel:'모델명',
    hintPort:'게임 설정 화면의 AI Connection에 표시된 포트 (7337~7356)',
    legTrig:'발화 트리거', lblPoll:'폴링 주기(초)', lblIdle:'잡담 간격(초)', lblAskChance:'질문 확률(0~1)',
    hintAskChance:'잡담 타이밍에 일반 대사 대신 버튼 질문(ask_and_wait)이 나갈 확률',
    chkGreet:'시작 인사', chkHot:'게이지 반응', chkAchv:'업적 축하', chkIdle:'잡담', chkAsk:'질문 허용',
    legMem:'메모리', lblMemRecent:'최근 기억 수(줄)', chkMemSummary:'장기 요약 사용',
    hintMem:'최근 기억이 1.5배를 넘으면 오래된 기록을 로컬 모델이 요약해 보관 (32k 컨텍스트 기준 100줄도 여유)',
    lblMemView:'현재 장기 기억', btnMemRefresh:'기억 보기 새로고침', btnMemClear:'기억 전체 삭제',
    btnSave:'저장 (실행 중이면 재시작)',
    msgSaved:'설정 저장됨', msgMemCleared:'기억 전체 삭제됨', msgConnFail:'연결 실패: ',
    msgAsking:'질문 생성 중... (게임 화면에서 버튼으로 답해줘)',
    typing:'답변 생성 중',
    memNone:'(요약 없음)', memCount:n=>`— 최근 기억 ${n}줄 보관 중`, memDeleted:'(삭제됨)',
    tagAsk:'질문', tagAnswer:'버튼 답변',
  },
  en: {
    tabChat:'Chat', tabSettings:'Settings',
    statusOn:'Running', statusOff:'Stopped', statusConnecting:'Connecting...', btnStart:'Start', btnStop:'Stop', btnConnecting:'Connecting...',
    placeholder:'Type a message... (Enter: chat / Ctrl+Enter: speak as-is)',
    btnSend:'Chat', btnSay:'Speak', btnAsk:'Make her ask',
    legPersona:'Persona', lblName:'Name', lblAge:'Age', lblCall:'How she calls you', lblPersonality:'Personality', lblStyle:'Speech style',
    legConn:'Connection', lblPort:'BongoWaifu port', lblModel:'Model name',
    hintPort:'Port shown in the in-game AI Connection settings (7337–7356)',
    legTrig:'Speech triggers', lblPoll:'Poll interval (s)', lblIdle:'Chatter interval (s)', lblAskChance:'Ask chance (0–1)',
    hintAskChance:'Chance an idle chatter becomes a button question (ask_and_wait)',
    chkGreet:'Greeting', chkHot:'Gauge reaction', chkAchv:'Achievements', chkIdle:'Chatter', chkAsk:'Allow asks',
    legMem:'Memory', lblMemRecent:'Recent memory (lines)', chkMemSummary:'Long-term summary',
    hintMem:'When recent memory exceeds 1.5x, older lines are summarized by the local model (with 32k context even 100 lines is fine)',
    lblMemView:'Current long-term memory', btnMemRefresh:'Refresh memory view', btnMemClear:'Clear all memory',
    btnSave:'Save (restarts if running)',
    msgSaved:'Settings saved', msgMemCleared:'All memory cleared', msgConnFail:'Connection failed: ',
    msgAsking:'Generating question... (answer with the buttons in-game)',
    typing:'thinking',
    memNone:'(no summary)', memCount:n=>`— ${n} recent lines stored`, memDeleted:'(deleted)',
    tagAsk:'Question', tagAnswer:'Button answer',
  },
};
let lang = 'ko';
const t = k => I18N[lang][k];

function applyLang(l) {
  lang = I18N[l] ? l : 'ko';
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  $('chatInput').placeholder = t('placeholder');
  $('statusTxt').textContent = running ? t('statusOn') : t('statusOff');
  $('btnToggle').textContent = running ? t('btnStop') : t('btnStart');
}
$('language').onchange = () => applyLang($('language').value); // 즉시 미리보기 (저장해야 발화 언어 반영)

// 탭
document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('page-' + b.dataset.page).classList.add('active');
});

// 채팅 출력
function addMsg(cls, text, tag) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (tag) { const s = document.createElement('span'); s.className = 'tag'; s.textContent = tag; d.appendChild(s); }
  d.appendChild(document.createTextNode(text));
  $('chatLog').appendChild(d);
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
}

// 메인 프로세스 로그 수신 (자동 발화 등)
window.api.onLog(({ type, text }) => {
  if (type === 'say')    addMsg('waifu', text.replace(/^\[\w+\]\s*/, ''), text.match(/^\[(\w+)\]/)?.[1]);
  else if (type === 'ask')    addMsg('waifu', text, t('tagAsk'));
  else if (type === 'answer') addMsg('user', text, t('tagAnswer'));
  else if (type === 'error')  addMsg('sys', '⚠ ' + text);
  else addMsg('sys', text);
});

// 시작/중지 (상태: stopped → connecting → running)
function setStatus(on) {
  running = on;
  const b = $('btnToggle');
  b.disabled = false;
  b.classList.remove('connecting');
  b.classList.toggle('running', on);
  $('dot').classList.toggle('on', on);
  $('statusTxt').textContent = on ? t('statusOn') : t('statusOff');
  b.textContent = on ? t('btnStop') : t('btnStart');
}
function setConnecting() {
  const b = $('btnToggle');
  b.disabled = true;                  // 연결 중엔 클릭 불가
  b.classList.add('connecting');
  b.textContent = t('btnConnecting');
  $('statusTxt').textContent = t('statusConnecting');
}
$('btnToggle').onclick = async () => {
  if (running) { await window.api.stop(); setStatus(false); return; }
  setConnecting();
  const r = await window.api.start();
  setStatus(!!r.ok);
  if (!r.ok) addMsg('sys', '⚠ ' + t('msgConnFail') + r.error);
};

// 채팅 전송 (생성 중 표시 + 입력 잠금)
async function sendChat() {
  const txt = $('chatInput').value.trim();
  if (!txt) return;
  $('chatInput').value = '';
  addMsg('user', txt);
  $('btnSend').disabled = $('btnSay').disabled = $('btnAsk').disabled = true;
  const tip = document.createElement('div');
  tip.className = 'msg waifu typing';
  tip.textContent = t('typing');
  $('chatLog').appendChild(tip);
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
  try {
    const r = await window.api.chat(txt);
    if (r.ok) addMsg('waifu', r.reply);
    else addMsg('sys', '⚠ ' + r.error);
  } finally {
    tip.remove();
    $('btnSend').disabled = $('btnSay').disabled = $('btnAsk').disabled = false;
  }
}
async function sendSay() {
  const txt = $('chatInput').value.trim();
  if (!txt) return;
  $('chatInput').value = '';
  const r = await window.api.sayManual(txt);
  if (!r.ok) addMsg('sys', '⚠ ' + r.error);
}
$('btnSend').onclick = sendChat;
$('btnSay').onclick = sendSay;
$('chatInput').onkeydown = e => {
  if (e.key === 'Enter') (e.ctrlKey ? sendSay : sendChat)();
};
$('btnAsk').onclick = async () => {
  addMsg('sys', t('msgAsking'));
  const r = await window.api.askNow();
  if (!r.ok) addMsg('sys', '⚠ ' + r.error);
};

// 설정 로드/저장
async function loadSettings() {
  const s = await window.api.getSettings();
  FIELDS_TXT.forEach(k => $(k).value = s[k]);
  FIELDS_NUM.forEach(k => $(k).value = s[k]);
  FIELDS_CHK.forEach(k => $(k).checked = !!s[k]);
  applyLang(s.language);
}
$('btnSave').onclick = async () => {
  const s = {};
  FIELDS_TXT.forEach(k => s[k] = $(k).value);
  FIELDS_NUM.forEach(k => s[k] = +$(k).value);
  FIELDS_CHK.forEach(k => s[k] = $(k).checked);
  const r = await window.api.saveSettings(s);
  applyLang(s.language);
  addMsg('sys', r.ok ? t('msgSaved') : '⚠ ' + r.error);
};

// 메모리
$('btnMemRefresh').onclick = async () => {
  const m = await window.api.getMemory();
  $('memSummaryView').textContent =
    (m.summary || t('memNone')) + '\n' + t('memCount')(m.recent.length);
};
$('btnMemClear').onclick = async () => {
  await window.api.clearMemory();
  $('memSummaryView').textContent = t('memDeleted');
  addMsg('sys', t('msgMemCleared'));
};

applyLang('ko');
loadSettings();
window.api.status().then(s => setStatus(s.running));
</script>
</body>
</html>
